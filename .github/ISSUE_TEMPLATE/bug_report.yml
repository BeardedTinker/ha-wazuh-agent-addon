name: Bug report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2026.3.x"
  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      placeholder: "0.3.0"
  - type: input
    id: wazuh-version
    attributes:
      label: Wazuh Manager version
      placeholder: "4.14.x"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs (remove secrets!)
      render: shell
